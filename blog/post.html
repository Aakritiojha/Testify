<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS — Light & Dark
═══════════════════════════════════════════════ */
:root {
  --bg: #06070d;
  --bg2: #0a0c18;
  --surface: #0d1020;
  --surface2: #131629;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f2fa;
  --text2: #c8cce0;
  --muted: rgba(255,255,255,0.4);
  --muted2: rgba(255,255,255,0.25);
  --accent: #4f8eff;
  --accent2: #7c3aed;
  --accent-light: rgba(79,142,255,0.1);
  --accent-mid: rgba(79,142,255,0.18);
  --link: #4f8eff;
  --link-hover: #7ca8ff;
  --radius: 10px;
  --font-body: 'DM Sans', sans-serif;
  --font-display: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,.5),0 2px 6px rgba(0,0,0,.3);
  --toc-w: 260px;
}

/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);line-height:1.7;transition:background .25s,color .25s;-webkit-font-smoothing:antialiased}

/* ═══════════════════════════════════════════════
   NAV
═══════════════════════════════════════════════ */
.nav{position:sticky;top:0;z-index:100;background:rgba(6,7,13,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.07);transition:background .25s}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 40px;height:80px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.nav-logo{font-family:var(--font-display);font-weight:800;font-size:18px;color:#f0f2fa;text-decoration:none;display:flex;align-items:center;gap:7px;letter-spacing:-.2px;flex-shrink:0}
.nav-logo-dot{width:7px;height:7px;border-radius:50%;background:#2563ff;box-shadow:0 0 10px rgba(37,99,255,0.8);flex-shrink:0}
.nav-links{display:flex;gap:24px;list-style:none}
.nav-links a{font-size:13px;color:rgba(255,255,255,0.4);text-decoration:none;transition:color .3s;font-family:'DM Sans',sans-serif;font-weight:500}
.nav-links a:hover,.nav-links a.active{color:#fff}
.nav-cta{padding:10px 20px;border-radius:12px;background:#2563ff;color:#fff;border:none;font-weight:600;cursor:pointer;transition:.3s;font-family:'DM Sans',sans-serif;font-size:13px;text-decoration:none;white-space:nowrap}
.nav-cta:hover{background:#3b7fff;transform:translateY(-2px);box-shadow:0 10px 20px rgba(37,99,255,0.3)}

/* Progress bar */
.progress-bar{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,#2563ff,#7c3aed);width:0%;z-index:200;transition:width .1s linear}

/* ═══════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════ */
.page-wrap{max-width:1200px;margin:0 auto;padding:0 24px}
.content-grid{display:grid;grid-template-columns:1fr var(--toc-w);gap:64px;align-items:start;padding:48px 0 96px}

/* ═══════════════════════════════════════════════
   HERO / COVER
═══════════════════════════════════════════════ */
.cover-wrap{width:100%;aspect-ratio:21/9;overflow:hidden;border-radius:14px;margin-bottom:40px;background:var(--surface2);border:1px solid var(--border)}
.cover-img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .4s}
.cover-img[src=""]{display:none}

/* ═══════════════════════════════════════════════
   POST HEADER
═══════════════════════════════════════════════ */
.post-header{margin-bottom:36px}
.category-tag{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-mid);margin-bottom:16px;text-decoration:none;transition:all .15s}
.category-tag:hover{background:var(--accent-mid)}
.post-title{font-family:var(--font-display);font-size:clamp(28px,4vw,44px);font-weight:800;line-height:1.12;letter-spacing:-.5px;color:var(--text);margin-bottom:18px}
.post-excerpt{font-size:18px;color:var(--muted);line-height:1.65;margin-bottom:24px;font-weight:400}
.post-meta{display:flex;align-items:center;flex-wrap:wrap;gap:16px;padding:16px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.meta-author{display:flex;align-items:center;gap:10px}
.author-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent-mid);border:2px solid var(--accent-light);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:13px;color:var(--accent);flex-shrink:0}
.author-name{font-weight:600;font-size:14px;color:var(--text2)}
.meta-divider{width:3px;height:3px;border-radius:50%;background:var(--border2)}
.meta-item{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:5px}
.meta-item svg{flex-shrink:0;opacity:.7}
.share-btns{display:flex;align-items:center;gap:6px;margin-left:auto}
.share-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;font-family:var(--font-body);transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.share-btn:hover{border-color:var(--border2);color:var(--text);background:var(--border)}

/* ═══════════════════════════════════════════════
   BODY CONTENT
═══════════════════════════════════════════════ */
.post-body{font-size:17px;line-height:1.8;color:var(--text2)}
.post-body h2{font-family:var(--font-display);font-size:clamp(20px,2.5vw,28px);font-weight:800;color:var(--text);margin:52px 0 16px;letter-spacing:-.3px;line-height:1.2;scroll-margin-top:80px}
.post-body h3{font-family:var(--font-display);font-size:clamp(17px,2vw,22px);font-weight:700;color:var(--text);margin:36px 0 12px;letter-spacing:-.2px;scroll-margin-top:80px}
.post-body h4{font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--text);margin:28px 0 8px;scroll-margin-top:80px}
.post-body p{margin-bottom:22px}
.post-body a{color:var(--link);text-decoration:underline;text-underline-offset:3px;text-decoration-thickness:1px;transition:color .15s}
.post-body a:hover{color:var(--link-hover)}
.post-body strong{color:var(--text);font-weight:600}
.post-body em{font-style:italic}
.post-body ul,.post-body ol{padding-left:24px;margin-bottom:22px}
.post-body li{margin-bottom:8px}
.post-body ul li::marker{color:var(--accent)}
.post-body blockquote{border-left:3px solid var(--accent);padding:14px 20px;background:var(--accent-light);border-radius:0 8px 8px 0;margin:28px 0;font-style:italic;color:var(--muted)}
.post-body blockquote p{margin:0}
.post-body pre{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:20px 24px;overflow-x:auto;margin:24px 0;font-size:14px}
.post-body code{font-family:var(--font-mono);font-size:14px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;color:var(--accent)}
.post-body pre code{background:none;border:none;padding:0;color:var(--text2)}
.post-body img{max-width:100%;border-radius:10px;border:1px solid var(--border);display:block;margin:28px 0}
.post-body figure{margin:28px 0}
.post-body figcaption{font-size:12px;color:var(--muted);text-align:center;margin-top:8px}
.post-body hr{border:none;border-top:1px solid var(--border);margin:40px 0}
.post-body table{width:100%;border-collapse:collapse;margin:24px 0;font-size:15px}
.post-body th{background:var(--surface2);font-weight:700;font-family:var(--font-display);font-size:12px;text-transform:uppercase;letter-spacing:.06em;padding:10px 14px;border:1px solid var(--border);text-align:left;color:var(--text)}
.post-body td{padding:10px 14px;border:1px solid var(--border);color:var(--text2)}
.post-body tr:nth-child(even) td{background:var(--bg2)}

/* ═══════════════════════════════════════════════
   TABLE OF CONTENTS
═══════════════════════════════════════════════ */
.toc-sidebar{position:sticky;top:80px;align-self:start;max-height:calc(100vh - 120px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.toc-sidebar::-webkit-scrollbar{width:3px}
.toc-sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.toc-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;transition:border-color .2s}
.toc-title{font-family:var(--font-display);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.toc-title::after{content:'';flex:1;height:1px;background:var(--border)}
.toc-list{list-style:none;display:flex;flex-direction:column;gap:2px}
.toc-item a{display:block;font-size:13px;color:var(--muted);text-decoration:none;padding:5px 8px;border-radius:6px;border-left:2px solid transparent;transition:all .15s;line-height:1.4}
.toc-item a:hover{color:var(--text);background:var(--surface2)}
.toc-item.active a{color:var(--accent);border-left-color:var(--accent);background:var(--accent-light);font-weight:500}
.toc-item.h3-item a{padding-left:18px;font-size:12px}
.toc-progress{margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.toc-prog-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);margin-bottom:6px;display:flex;justify-content:space-between}
.toc-prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.toc-prog-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width .2s}

/* ═══════════════════════════════════════════════
   RELATED / FOOTER
═══════════════════════════════════════════════ */
.post-footer{margin-top:60px;padding-top:40px;border-top:1px solid var(--border)}
.post-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:36px}
.tag{display:inline-flex;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;background:var(--surface2);color:var(--muted);border:1px solid var(--border);text-decoration:none;transition:all .15s}
.tag:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

.author-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 28px;display:flex;gap:20px;align-items:flex-start;margin-bottom:36px}
.author-card-avatar{width:56px;height:56px;border-radius:50%;background:var(--accent-mid);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:20px;color:var(--accent);flex-shrink:0}
.author-card-name{font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--text);margin-bottom:4px}
.author-card-bio{font-size:13px;color:var(--muted);line-height:1.6}

/* ═══════════════════════════════════════════════
   BACK TO TOP
═══════════════════════════════════════════════ */
.back-top{position:fixed;bottom:28px;right:28px;width:40px;height:40px;background:var(--surface);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow-md);opacity:0;transform:translateY(10px);transition:all .2s;color:var(--muted);z-index:50}
.back-top.visible{opacity:1;transform:translateY(0)}
.back-top:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

/* ═══════════════════════════════════════════════
   LOADING / SKELETON
═══════════════════════════════════════════════ */
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;display:block}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ═══════════════════════════════════════════════
   ERROR STATE
═══════════════════════════════════════════════ */
.error-state{text-align:center;padding:80px 24px}
.error-state h2{font-family:var(--font-display);font-size:24px;font-weight:800;margin-bottom:12px;color:var(--text)}
.error-state p{color:var(--muted);margin-bottom:24px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;border:none;text-decoration:none;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}

/* ═══════════════════════════════════════════════
   SITE FOOTER
═══════════════════════════════════════════════ */
.site-footer{border-top:1px solid var(--border);background:var(--bg2);padding:40px 24px;text-align:center}
.site-footer .footer-logo{font-family:var(--font-display);font-weight:800;font-size:16px;color:var(--accent);margin-bottom:8px}
.site-footer p{font-size:12px;color:var(--muted2)}
.site-footer a{color:var(--muted);text-decoration:none;transition:color .15s}
.site-footer a:hover{color:var(--accent)}

/* ═══════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════ */
@media(max-width:900px){
  .content-grid{grid-template-columns:1fr;gap:0}
  .toc-sidebar{display:none}
  .post-body h2{scroll-margin-top:70px}
  .mobile-toc{display:block!important}
  .share-btns{display:none}
  .post-excerpt{font-size:16px}
}
.mobile-toc{display:none;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:32px}
.mobile-toc summary{font-family:var(--font-display);font-size:13px;font-weight:700;cursor:pointer;color:var(--text);list-style:none;display:flex;align-items:center;justify-content:space-between}
.mobile-toc summary::after{content:'↓';font-size:11px;color:var(--muted)}
.mobile-toc[open] summary::after{content:'↑'}
.mobile-toc .toc-list{margin-top:12px}

@media(max-width:600px){
  .page-wrap{padding:0 16px}
  .nav-inner{padding:0 16px}
  .nav-links{display:none}
  .content-grid{padding:32px 0 64px}
  .cover-wrap{border-radius:10px}
}
</style>

const SUPA_URL = 'https://xwxzdxgzsjgkfrjyhwna.supabase.co';

// ── FOOTER YEAR ───────────────────────────────────────────────
document.getElementById('footer-year').textContent = new Date().getFullYear();

// ── BACK TO TOP ───────────────────────────────────────────────
const backTop = document.getElementById('back-top');
backTop.addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));

// ── SCROLL: PROGRESS + TOC HIGHLIGHT + BACK-TO-TOP ───────────
const progBar  = document.getElementById('progress-bar');
const progFill = document.getElementById('prog-fill');
const progPct  = document.getElementById('prog-pct');
let tocAnchors = [];

window.addEventListener('scroll', () => {
  const scrollTop = window.scrollY;
  const docH = document.documentElement.scrollHeight - window.innerHeight;
  const pct  = docH > 0 ? Math.min(100, Math.round((scrollTop / docH) * 100)) : 0;

  progBar.style.width  = pct + '%';
  progFill.style.width = pct + '%';
  progPct.textContent  = pct + '%';
  backTop.classList.toggle('visible', scrollTop > 400);

  // TOC active highlight
  if (tocAnchors.length) {
    let current = tocAnchors[0].id;
    for (const el of tocAnchors) {
      if (el.getBoundingClientRect().top <= 100) current = el.id;
    }
    document.querySelectorAll('.toc-item').forEach(item => {
      item.classList.toggle('active', item.dataset.id === current);
    });
  }
}, { passive: true });

// ── FETCH POST ────────────────────────────────────────────────
async function loadPost() {
  const slug = new URLSearchParams(window.location.search).get('slug');
  if (!slug) return showError('No post specified.', 'Missing slug');

  try {
    const r = await fetch(
      `${SUPA_URL}/rest/v1/posts?slug=eq.${encodeURIComponent(slug)}&status=eq.published&limit=1`,
      { headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` } }
    );
    if (!r.ok) throw new Error('Network error');
    const data = await r.json();
    if (!data.length) return showError('Post not found.', 'This post may have been moved or deleted.');
    renderPost(data[0]);
  } catch(e) {
    showError('Failed to load post.', e.message);
  }
}

// ── RENDER POST ───────────────────────────────────────────────
function renderPost(p) {
  // Cover image
  if (p.cover_image) {
    const wrap = document.getElementById('cover-wrap');
    const img  = document.getElementById('cover-img');
    img.src = p.cover_image;
    img.alt = p.title || '';
    wrap.style.display = 'block';
  }

  // Meta tags
  const title    = p.title || 'Untitled';
  const desc     = p.meta_description || p.excerpt || '';
  const canonical = `${location.origin}/blog/post.html?slug=${p.slug}`;
  const imgUrl   = p.cover_image || '';

  document.title = `${title} | SkipTheLogic`;
  setMeta('meta-title-el', 'textContent', `${title} | SkipTheLogic`);
  setMeta('meta-desc-el', 'content', desc);
  setMeta('meta-author-el', 'content', p.author || 'SkipTheLogic');
  document.getElementById('canonical-el').href = canonical;

  // OG
  setMeta('og-title', 'content', title);
  setMeta('og-desc', 'content', desc);
  setMeta('og-image', 'content', imgUrl);
  setMeta('og-url', 'content', canonical);
  setMeta('og-author', 'content', p.author || 'SkipTheLogic');
  if (p.created_at) setMeta('og-published', 'content', p.created_at);
  if (p.updated_at) setMeta('og-modified', 'content', p.updated_at);

  // Twitter
  setMeta('tw-title', 'content', title);
  setMeta('tw-desc', 'content', desc);
  setMeta('tw-image', 'content', imgUrl);

  // JSON-LD
  const jsonld = {
    '@context': 'https://schema.org',
    '@type': 'BlogPosting',
    headline: title,
    description: desc,
    image: imgUrl || undefined,
    author: { '@type': 'Person', name: p.author || 'SkipTheLogic' },
    publisher: { '@type': 'Organization', name: 'SkipTheLogic', url: location.origin },
    datePublished: p.created_at || undefined,
    dateModified: p.updated_at || undefined,
    mainEntityOfPage: { '@type': 'WebPage', '@id': canonical },
    keywords: p.focus_keyword || undefined,
    articleSection: p.category || undefined,
    timeRequired: `PT${p.read_time || 5}M`
  };
  document.getElementById('jsonld-el').textContent = JSON.stringify(jsonld);

  // Header
  const catSlug = (p.category||'').toLowerCase().replace(/\s+/g,'-');
  document.getElementById('post-header').innerHTML = `
    <a href="../blog/index.html?cat=${encodeURIComponent(p.category||'')}" class="category-tag" aria-label="Category: ${esc(p.category||'')}">
      ${esc(p.category || 'Article')}
    </a>
    <h1 class="post-title" itemprop="headline">${esc(title)}</h1>
    ${p.excerpt ? `<p class="post-excerpt" itemprop="description">${esc(p.excerpt)}</p>` : ''}
    <div class="post-meta">
      <div class="meta-author">
        <div class="author-avatar" aria-hidden="true">${(p.author||'S')[0].toUpperCase()}</div>
        <div>
          <div class="author-name" itemprop="author" itemscope itemtype="https://schema.org/Person">
            <span itemprop="name">${esc(p.author || 'SkipTheLogic')}</span>
          </div>
        </div>
      </div>
      <span class="meta-divider"></span>
      ${p.updated_at ? `<span class="meta-item">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><rect x="1" y="2" width="10" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M1 5h10M4 1v2M8 1v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        <time itemprop="dateModified" datetime="${p.updated_at}">${fmtDate(p.updated_at)}</time>
      </span>` : ''}
      <span class="meta-divider"></span>
      <span class="meta-item">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M6 3v3l2 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        <span>${p.read_time || 5} min read</span>
      </span>
      <div class="share-btns">
        <button class="share-btn" onclick="shareTwitter('${esc(title)}')" aria-label="Share on Twitter">𝕏 Share</button>
        <button class="share-btn" onclick="copyLink()" id="copy-btn" aria-label="Copy link">🔗 Copy</button>
      </div>
    </div>
  `;

  // Body
  document.getElementById('post-body').innerHTML = p.body || '<p>No content yet.</p>';

  // Add IDs to headings for TOC + anchors
  injectHeadingIds();

  // Build TOC
  buildTOC();

  // Post footer
  const footer = document.getElementById('post-footer');
  const initials = (p.author||'Skip').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  footer.innerHTML = `
    <div class="post-tags" id="post-tags">
      ${p.category ? `<a href="../blog/index.html?cat=${encodeURIComponent(p.category)}" class="tag">${esc(p.category)}</a>` : ''}
      ${p.focus_keyword ? `<a href="../blog/index.html?q=${encodeURIComponent(p.focus_keyword)}" class="tag">${esc(p.focus_keyword)}</a>` : ''}
    </div>
    <div class="author-card" role="complementary" aria-label="About the author">
      <div class="author-card-avatar" aria-hidden="true">${initials}</div>
      <div>
        <div class="author-card-name">${esc(p.author || 'SkipTheLogic')}</div>
        <div class="author-card-bio">Written for SkipTheLogic — practical insights to help you work smarter, not harder.</div>
      </div>
    </div>
    <a href="index_blog.html" class="btn btn-primary">← Back to all posts</a>
  `;
  footer.style.display = 'block';
}

// ── TOC BUILDER ───────────────────────────────────────────────
function injectHeadingIds() {
  const body = document.getElementById('post-body');
  const seen = {};
  body.querySelectorAll('h2,h3,h4').forEach(h => {
    if (!h.id) {
      let id = h.textContent.toLowerCase().trim()
        .replace(/[^a-z0-9\s-]/g,'')
        .replace(/\s+/g,'-').replace(/-+/g,'-');
      if (seen[id]) { seen[id]++; id = id + '-' + seen[id]; } else { seen[id] = 1; }
      h.id = id;
    }
    // Add anchor link
    const anchor = document.createElement('a');
    anchor.href = '#' + h.id;
    anchor.style.cssText = 'color:inherit;text-decoration:none;margin-left:8px;opacity:0;font-size:.7em;transition:opacity .15s;vertical-align:middle';
    anchor.textContent = '#';
    anchor.setAttribute('aria-hidden', 'true');
    h.appendChild(anchor);
    h.addEventListener('mouseenter', () => anchor.style.opacity = '.4');
    h.addEventListener('mouseleave', () => anchor.style.opacity = '0');
  });
}

function buildTOC() {
  const body = document.getElementById('post-body');
  const headings = [...body.querySelectorAll('h2,h3')];
  tocAnchors = headings;

  if (!headings.length) {
    document.getElementById('toc-sidebar').style.display = 'none';
    return;
  }

  const makeItems = (list) => headings.map(h => {
    const isH3 = h.tagName === 'H3';
    const li = document.createElement('li');
    li.className = `toc-item${isH3 ? ' h3-item' : ''}`;
    li.dataset.id = h.id;
    li.innerHTML = `<a href="#${h.id}">${esc(h.textContent.replace(/#$/,'').trim())}</a>`;
    li.querySelector('a').addEventListener('click', e => {
      e.preventDefault();
      document.getElementById(h.id)?.scrollIntoView({behavior:'smooth',block:'start'});
    });
    list.appendChild(li);
    return li;
  });

  makeItems(document.getElementById('toc-list'));

  // Mobile TOC
  const mToc = document.getElementById('mobile-toc');
  const mList = document.getElementById('mobile-toc-list');
  makeItems(mList);
  mToc.style.display = 'block';
}

// ── SHARE ─────────────────────────────────────────────────────
function shareTwitter(title) {
  const url = encodeURIComponent(location.href);
  const t   = encodeURIComponent(title + ' via @SkipTheLogic');
  window.open(`https://twitter.com/intent/tweet?text=${t}&url=${url}`, '_blank', 'width=560,height=400');
}

function copyLink() {
  navigator.clipboard.writeText(location.href).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = '🔗 Copy', 2000);
  });
}

// ── HELPERS ───────────────────────────────────────────────────
function setMeta(id, attr, val) {
  const el = document.getElementById(id);
  if (el && val) el[attr] = val;
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'});
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function showError(title, msg) {
  document.getElementById('cover-wrap').style.display = 'none';
  document.getElementById('post-header').innerHTML = '';
  document.getElementById('post-body').innerHTML = `
    <div class="error-state">
      <div style="font-size:48px;margin-bottom:16px">📄</div>
      <h2>${esc(title)}</h2>
      <p>${esc(msg)}</p>
      <a href="../blog/index.html" class="btn btn-primary">← Back to Blog</a>
    </div>`;
  document.getElementById('toc-sidebar').style.display = 'none';
}

// ── INIT ──────────────────────────────────────────────────────
loadPost();
</script>
